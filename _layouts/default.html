<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{ --ink:#1e293b; --muted:#475569; --line:#e2e8f0; --accent:#0284c7; --bg:#ffffff; }
    *{ box-sizing:border-box; }
    body{ margin:0; background:var(--bg); color:var(--ink);
      font-family:'IBM Plex Sans Thai','Sarabun','Noto Sans Thai',sans-serif;
      font-size:17px; line-height:1.7; }
    .wrap{ max-width:1080px; margin:0 auto; padding:40px 28px 80px; }
    h1{ font-size:30px; font-weight:700; line-height:1.35; margin:0 0 8px; }
    h2{ font-size:23px; font-weight:700; margin:40px 0 14px; padding-top:14px; border-top:2px solid var(--line); }
    h3{ font-size:19px; font-weight:600; margin:24px 0 10px; color:var(--muted); }
    p{ margin:10px 0; }
    hr{ border:none; border-top:1px solid var(--line); margin:28px 0; }
    img{ max-width:100%; height:auto; display:block; margin:16px 0; border:1px solid var(--line); border-radius:12px; }
    table{ width:100%; border-collapse:collapse; margin:16px 0; font-size:16px; }
    th,td{ border:1px solid var(--line); padding:9px 13px; text-align:left; vertical-align:top; }
    thead th{ background:#f1f5f9; font-weight:600; }
    tbody tr:nth-child(even){ background:#f8fafc; }
    blockquote{ margin:16px 0; padding:12px 18px; background:#fff7ed;
      border-left:4px solid #fb923c; border-radius:8px; color:#9a3412; }
    ul{ padding-left:22px; }
    li{ margin:6px 0; }
    li input[type=checkbox]{ transform:scale(1.15); margin-right:8px; }
    code{ background:#f1f5f9; padding:2px 6px; border-radius:5px; font-size:0.9em; }
    a{ color:var(--accent); }
    .foot{ margin-top:48px; padding-top:16px; border-top:1px solid var(--line);
      font-size:14px; color:#94a3b8; }
  </style>
</head>
<body>
  <div class="wrap">
    {{ content }}
    <div class="foot">NewGen รุ่น 2 · เอกสารเตรียมงานจัดสถานที่ · อัปเดตอัตโนมัติจาก GitHub</div>
  </div>
</body>
</html>
