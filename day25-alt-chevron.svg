<svg viewBox="0 0 900 820" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans Thai','Sarabun','Noto Sans Thai',sans-serif">
  <style>
    .title{font-size:26px;font-weight:700;fill:#1e293b}
    .sub{font-size:15px;fill:#475569}
    .lbl{font-size:14px;font-weight:600;fill:#0f172a}
    .small{font-size:12px;fill:#334155}
    .note{font-size:13px;fill:#334155}
    .noteh{font-size:14px;font-weight:700;fill:#0f172a}
  </style>

  <text x="40" y="40" class="title">แบบ B — Chevron (เฉียงหันเข้าเวที)</text>
  <text x="40" y="64" class="sub">โต๊ะกลม 8 โต๊ะ จัด 2 ฝั่งเฉียงเข้าเวที · ทางเดินกลางเป็นรูปตัว V ชี้สู่เวที</text>

  <rect x="40" y="80" width="820" height="600" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>

  <!-- stage -->
  <rect x="150" y="96" width="600" height="58" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="2" stroke-dasharray="8 5"/>
  <text x="450" y="122" text-anchor="middle" class="lbl" fill="#c2410c">พื้นที่เวที / แสงสีเสียง (ด้านหน้า)</text>
  <text x="450" y="141" text-anchor="middle" class="small" fill="#c2410c">ทีมเข้าติดตั้งช่วงเย็น หลังจบกิจกรรม</text>

  <!-- center V aisle guide -->
  <path d="M450,168 L300,640 M450,168 L600,640" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 8" fill="none"/>
  <text x="450" y="430" text-anchor="middle" class="small" fill="#94a3b8">ทางเดินกลาง</text>

  <!-- LEFT bank: tables 1,3,5,7 (shift left going back) with flip charts on the left -->
  <g><circle cx="300" cy="238" r="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text x="300" y="243" text-anchor="middle" class="lbl">โต๊ะ 1</text>
     <g transform="translate(200,214)"><rect width="34" height="26" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><line x1="6" y1="26" x2="3" y2="42" stroke="#ca8a04" stroke-width="2"/><line x1="28" y1="26" x2="31" y2="42" stroke="#ca8a04" stroke-width="2"/></g></g>
  <g><circle cx="275" cy="356" r="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text x="275" y="361" text-anchor="middle" class="lbl">โต๊ะ 3</text>
     <g transform="translate(163,332)"><rect width="34" height="26" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><line x1="6" y1="26" x2="3" y2="42" stroke="#ca8a04" stroke-width="2"/><line x1="28" y1="26" x2="31" y2="42" stroke="#ca8a04" stroke-width="2"/></g></g>
  <g><circle cx="250" cy="474" r="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text x="250" y="479" text-anchor="middle" class="lbl">โต๊ะ 5</text>
     <g transform="translate(138,450)"><rect width="34" height="26" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><line x1="6" y1="26" x2="3" y2="42" stroke="#ca8a04" stroke-width="2"/><line x1="28" y1="26" x2="31" y2="42" stroke="#ca8a04" stroke-width="2"/></g></g>
  <g><circle cx="225" cy="592" r="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text x="225" y="597" text-anchor="middle" class="lbl">โต๊ะ 7</text>
     <g transform="translate(113,568)"><rect width="34" height="26" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><line x1="6" y1="26" x2="3" y2="42" stroke="#ca8a04" stroke-width="2"/><line x1="28" y1="26" x2="31" y2="42" stroke="#ca8a04" stroke-width="2"/></g></g>

  <!-- RIGHT bank: tables 2,4,6,8 (shift right going back) with flip charts on the right -->
  <g><circle cx="600" cy="238" r="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text x="600" y="243" text-anchor="middle" class="lbl">โต๊ะ 2</text>
     <g transform="translate(666,214)"><rect width="34" height="26" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><line x1="6" y1="26" x2="3" y2="42" stroke="#ca8a04" stroke-width="2"/><line x1="28" y1="26" x2="31" y2="42" stroke="#ca8a04" stroke-width="2"/></g></g>
  <g><circle cx="625" cy="356" r="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text x="625" y="361" text-anchor="middle" class="lbl">โต๊ะ 4</text>
     <g transform="translate(691,332)"><rect width="34" height="26" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><line x1="6" y1="26" x2="3" y2="42" stroke="#ca8a04" stroke-width="2"/><line x1="28" y1="26" x2="31" y2="42" stroke="#ca8a04" stroke-width="2"/></g></g>
  <g><circle cx="650" cy="474" r="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text x="650" y="479" text-anchor="middle" class="lbl">โต๊ะ 6</text>
     <g transform="translate(716,450)"><rect width="34" height="26" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><line x1="6" y1="26" x2="3" y2="42" stroke="#ca8a04" stroke-width="2"/><line x1="28" y1="26" x2="31" y2="42" stroke="#ca8a04" stroke-width="2"/></g></g>
  <g><circle cx="675" cy="592" r="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text x="675" y="597" text-anchor="middle" class="lbl">โต๊ะ 8</text>
     <g transform="translate(741,568)"><rect width="34" height="26" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><line x1="6" y1="26" x2="3" y2="42" stroke="#ca8a04" stroke-width="2"/><line x1="28" y1="26" x2="31" y2="42" stroke="#ca8a04" stroke-width="2"/></g></g>

  <!-- teacher table back -->
  <rect x="360" y="638" width="180" height="28" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="450" y="657" text-anchor="middle" class="lbl" fill="#15803d">โต๊ะทีมอาจารย์</text>

  <!-- notes -->
  <rect x="40" y="700" width="820" height="105" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="58" y="724" class="noteh">แบบ B — Chevron</text>
  <text x="58" y="748" class="note">✔ ทุกโต๊ะเฉียงหันเข้าเวที มองเห็นเวที/จอชัดกว่าแบบ Grid</text>
  <text x="58" y="770" class="note">✔ ทางเดินกลางกว้าง วิทยากรเดินให้คำปรึกษาสองฝั่งได้สะดวก</text>
  <text x="58" y="792" class="note">เหมาะกับ: ช่วงมีบรรยาย/นำเสนอสลับกับ workshop · Flip Chart 8 อัน (โต๊ะละ 1)</text>
</svg>
