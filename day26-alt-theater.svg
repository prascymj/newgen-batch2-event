<svg viewBox="0 0 900 820" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans Thai','Sarabun','Noto Sans Thai',sans-serif">
  <style>
    .title{font-size:26px;font-weight:700;fill:#1e293b}
    .sub{font-size:15px;fill:#475569}
    .lbl{font-size:14px;font-weight:600;fill:#0f172a}
    .small{font-size:12px;fill:#334155}
    .note{font-size:13px;fill:#334155}
    .noteh{font-size:14px;font-weight:700;fill:#0f172a}
    .wht{font-size:15px;font-weight:700;fill:#fff}
    .chair{fill:#e0e7ff;stroke:#4f46e5;stroke-width:1.6}
  </style>

  <text x="40" y="40" class="title">แบบ C — Theater (เก้าอี้แถว หันเข้าเวที)</text>
  <text x="40" y="64" class="sub">ผู้เรียน 40 คน · เก้าอี้ 5 แถว × 8 (ไม่มีโต๊ะ) · จุคนได้มากสุด · กรรมการ 8 · โพเดียม 2 · โต๊ะ อจ ด้านหลัง</text>

  <rect x="40" y="80" width="820" height="600" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>

  <!-- Stage -->
  <rect x="130" y="96" width="640" height="64" rx="8" fill="#1e293b"/>
  <text x="230" y="135" class="wht">เวที</text>
  <rect x="360" y="102" width="180" height="52" rx="4" fill="#0ea5e9" stroke="#0369a1" stroke-width="2"/>
  <text x="450" y="123" text-anchor="middle" class="small" fill="#fff">จอในห้อง</text>
  <text x="450" y="140" text-anchor="middle" class="small" fill="#fff">แนวนอน 16:9</text>

  <!-- Podiums -->
  <g transform="translate(150,166)"><rect width="46" height="36" rx="4" fill="#f59e0b" stroke="#b45309" stroke-width="2"/><text x="23" y="23" text-anchor="middle" class="small" fill="#fff">โพเดียม 1</text></g>
  <g transform="translate(704,166)"><rect width="46" height="36" rx="4" fill="#f59e0b" stroke="#b45309" stroke-width="2"/><text x="23" y="23" text-anchor="middle" class="small" fill="#fff">โพเดียม 2</text></g>

  <!-- Committee table -->
  <rect x="250" y="222" width="400" height="42" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2.5"/>
  <text x="450" y="249" text-anchor="middle" class="lbl" fill="#b91c1c">โต๊ะกรรมการ 8 คน (หน้าเวที)</text>

  <!-- Audience: 5 rows x 8 chairs (center aisle) -->
  <g>
    <!-- row 1 y=305 -->
    <rect class="chair" x="250" y="305" width="26" height="22" rx="4"/><rect class="chair" x="300" y="305" width="26" height="22" rx="4"/><rect class="chair" x="350" y="305" width="26" height="22" rx="4"/><rect class="chair" x="400" y="305" width="26" height="22" rx="4"/>
    <rect class="chair" x="474" y="305" width="26" height="22" rx="4"/><rect class="chair" x="524" y="305" width="26" height="22" rx="4"/><rect class="chair" x="574" y="305" width="26" height="22" rx="4"/><rect class="chair" x="624" y="305" width="26" height="22" rx="4"/>
    <!-- row 2 y=353 -->
    <rect class="chair" x="250" y="353" width="26" height="22" rx="4"/><rect class="chair" x="300" y="353" width="26" height="22" rx="4"/><rect class="chair" x="350" y="353" width="26" height="22" rx="4"/><rect class="chair" x="400" y="353" width="26" height="22" rx="4"/>
    <rect class="chair" x="474" y="353" width="26" height="22" rx="4"/><rect class="chair" x="524" y="353" width="26" height="22" rx="4"/><rect class="chair" x="574" y="353" width="26" height="22" rx="4"/><rect class="chair" x="624" y="353" width="26" height="22" rx="4"/>
    <!-- row 3 y=401 -->
    <rect class="chair" x="250" y="401" width="26" height="22" rx="4"/><rect class="chair" x="300" y="401" width="26" height="22" rx="4"/><rect class="chair" x="350" y="401" width="26" height="22" rx="4"/><rect class="chair" x="400" y="401" width="26" height="22" rx="4"/>
    <rect class="chair" x="474" y="401" width="26" height="22" rx="4"/><rect class="chair" x="524" y="401" width="26" height="22" rx="4"/><rect class="chair" x="574" y="401" width="26" height="22" rx="4"/><rect class="chair" x="624" y="401" width="26" height="22" rx="4"/>
    <!-- row 4 y=449 -->
    <rect class="chair" x="250" y="449" width="26" height="22" rx="4"/><rect class="chair" x="300" y="449" width="26" height="22" rx="4"/><rect class="chair" x="350" y="449" width="26" height="22" rx="4"/><rect class="chair" x="400" y="449" width="26" height="22" rx="4"/>
    <rect class="chair" x="474" y="449" width="26" height="22" rx="4"/><rect class="chair" x="524" y="449" width="26" height="22" rx="4"/><rect class="chair" x="574" y="449" width="26" height="22" rx="4"/><rect class="chair" x="624" y="449" width="26" height="22" rx="4"/>
    <!-- row 5 y=497 -->
    <rect class="chair" x="250" y="497" width="26" height="22" rx="4"/><rect class="chair" x="300" y="497" width="26" height="22" rx="4"/><rect class="chair" x="350" y="497" width="26" height="22" rx="4"/><rect class="chair" x="400" y="497" width="26" height="22" rx="4"/>
    <rect class="chair" x="474" y="497" width="26" height="22" rx="4"/><rect class="chair" x="524" y="497" width="26" height="22" rx="4"/><rect class="chair" x="574" y="497" width="26" height="22" rx="4"/><rect class="chair" x="624" y="497" width="26" height="22" rx="4"/>
  </g>
  <text x="450" y="420" text-anchor="middle" class="small" fill="#94a3b8">ทางเดินกลาง</text>

  <!-- direction -->
  <line x1="700" y1="540" x2="700" y2="290" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#ar)"/>
  <defs><marker id="ar" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/></marker></defs>
  <text x="712" y="530" class="small" fill="#64748b">หันเข้าเวที</text>

  <!-- Teacher tables at BACK -->
  <rect x="150" y="558" width="180" height="28" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="240" y="577" text-anchor="middle" class="small" fill="#15803d">โต๊ะทีมอาจารย์ 1</text>
  <rect x="360" y="558" width="180" height="28" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="450" y="577" text-anchor="middle" class="small" fill="#15803d">โต๊ะทีมอาจารย์ 2</text>

  <!-- Portrait screen at entrance -->
  <rect x="606" y="580" width="52" height="76" rx="4" fill="#22c55e" stroke="#15803d" stroke-width="2"/>
  <text x="632" y="608" text-anchor="middle" class="small" fill="#fff">จอ</text>
  <text x="632" y="624" text-anchor="middle" class="small" fill="#fff">แนวตั้ง</text>
  <text x="632" y="640" text-anchor="middle" class="small" fill="#fff">9:16</text>
  <text x="672" y="612" class="small" fill="#15803d">จอหน้าห้อง</text>
  <text x="672" y="630" class="small" fill="#15803d">Artwork/ป้ายงาน</text>

  <!-- Notes -->
  <rect x="40" y="700" width="820" height="105" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="58" y="724" class="noteh">แบบ C — Theater · สรุปวันที่ 26</text>
  <rect x="58" y="736" width="16" height="16" rx="3" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/><text x="82" y="749" class="note">ผู้เรียน 40 คน — เก้าอี้ 5 แถว × 8 (ไม่มีโต๊ะ) จุคนได้มากสุด</text>
  <rect x="58" y="760" width="16" height="16" rx="3" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="82" y="773" class="note">โต๊ะกรรมการ 8 คน หน้าเวที · โพเดียม 2 อัน</text>
  <rect x="58" y="784" width="16" height="16" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="82" y="797" class="note">โต๊ะทีมอาจารย์ 2 ตัว ด้านหลัง (วิทยากร+อจ 10 คน)</text>
  <rect x="500" y="736" width="16" height="16" rx="3" fill="#0ea5e9" stroke="#0369a1" stroke-width="2"/><text x="524" y="749" class="note">จอในห้อง = แนวนอน 16:9</text>
  <rect x="500" y="760" width="16" height="16" rx="3" fill="#22c55e" stroke="#15803d" stroke-width="2"/><text x="524" y="773" class="note">จอหน้าห้อง = แนวตั้ง 9:16</text>
  <text x="500" y="797" class="note">เหมาะ: เน้นดูการนำเสนอ (pitching) เต็มรูปแบบ</text>
</svg>
