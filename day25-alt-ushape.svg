<svg viewBox="0 0 900 820" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans Thai','Sarabun','Noto Sans Thai',sans-serif">
  <style>
    .title{font-size:26px;font-weight:700;fill:#1e293b}
    .sub{font-size:15px;fill:#475569}
    .lbl{font-size:14px;font-weight:600;fill:#0f172a}
    .small{font-size:12px;fill:#334155}
    .note{font-size:13px;fill:#334155}
    .noteh{font-size:14px;font-weight:700;fill:#0f172a}
  </style>

  <text x="40" y="40" class="title">แบบ C — U-shape (ตัวยู เปิดกลางห้อง)</text>
  <text x="40" y="64" class="sub">ผู้เรียน 40 คน · โต๊ะกลม 8 (≈5/โต๊ะ) ล้อมตัว U · โต๊ะทีมอาจารย์ 2 ตัว (10) ด้านหลัง</text>

  <rect x="40" y="80" width="820" height="600" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>

  <!-- stage -->
  <rect x="150" y="96" width="600" height="58" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="2" stroke-dasharray="8 5"/>
  <text x="450" y="122" text-anchor="middle" class="lbl" fill="#c2410c">พื้นที่เวที / แสงสีเสียง (ด้านหน้า)</text>
  <text x="450" y="141" text-anchor="middle" class="small" fill="#c2410c">ทีมเข้าติดตั้งช่วงเย็น หลังจบกิจกรรม</text>

  <!-- open center -->
  <rect x="255" y="200" width="390" height="330" rx="14" fill="#ecfeff" stroke="#a5f3fc" stroke-width="2" stroke-dasharray="7 7"/>
  <text x="450" y="360" text-anchor="middle" class="small" fill="#0891b2">พื้นที่กลาง</text>
  <text x="450" y="380" text-anchor="middle" class="small" fill="#0891b2">(วิทยากรเดินให้คำปรึกษา / นำกิจกรรม)</text>

  <!-- LEFT column: 1,3,5 with flip charts on the outside (left) -->
  <g><circle cx="190" cy="250" r="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text x="190" y="255" text-anchor="middle" class="lbl">โต๊ะ 1</text>
     <g transform="translate(90,226)"><rect width="34" height="26" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><line x1="6" y1="26" x2="3" y2="42" stroke="#ca8a04" stroke-width="2"/><line x1="28" y1="26" x2="31" y2="42" stroke="#ca8a04" stroke-width="2"/></g></g>
  <g><circle cx="190" cy="368" r="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text x="190" y="373" text-anchor="middle" class="lbl">โต๊ะ 3</text>
     <g transform="translate(90,344)"><rect width="34" height="26" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><line x1="6" y1="26" x2="3" y2="42" stroke="#ca8a04" stroke-width="2"/><line x1="28" y1="26" x2="31" y2="42" stroke="#ca8a04" stroke-width="2"/></g></g>
  <g><circle cx="190" cy="486" r="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text x="190" y="491" text-anchor="middle" class="lbl">โต๊ะ 5</text>
     <g transform="translate(90,462)"><rect width="34" height="26" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><line x1="6" y1="26" x2="3" y2="42" stroke="#ca8a04" stroke-width="2"/><line x1="28" y1="26" x2="31" y2="42" stroke="#ca8a04" stroke-width="2"/></g></g>

  <!-- RIGHT column: 2,4,6 with flip charts on the outside (right) -->
  <g><circle cx="710" cy="250" r="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text x="710" y="255" text-anchor="middle" class="lbl">โต๊ะ 2</text>
     <g transform="translate(776,226)"><rect width="34" height="26" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><line x1="6" y1="26" x2="3" y2="42" stroke="#ca8a04" stroke-width="2"/><line x1="28" y1="26" x2="31" y2="42" stroke="#ca8a04" stroke-width="2"/></g></g>
  <g><circle cx="710" cy="368" r="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text x="710" y="373" text-anchor="middle" class="lbl">โต๊ะ 4</text>
     <g transform="translate(776,344)"><rect width="34" height="26" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><line x1="6" y1="26" x2="3" y2="42" stroke="#ca8a04" stroke-width="2"/><line x1="28" y1="26" x2="31" y2="42" stroke="#ca8a04" stroke-width="2"/></g></g>
  <g><circle cx="710" cy="486" r="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text x="710" y="491" text-anchor="middle" class="lbl">โต๊ะ 6</text>
     <g transform="translate(776,462)"><rect width="34" height="26" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><line x1="6" y1="26" x2="3" y2="42" stroke="#ca8a04" stroke-width="2"/><line x1="28" y1="26" x2="31" y2="42" stroke="#ca8a04" stroke-width="2"/></g></g>

  <!-- BOTTOM row: 7,8 (closing the U) with flip charts below -->
  <g><circle cx="380" cy="600" r="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text x="380" y="605" text-anchor="middle" class="lbl">โต๊ะ 7</text>
     <g transform="translate(300,632)"><rect width="34" height="26" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><line x1="6" y1="26" x2="3" y2="42" stroke="#ca8a04" stroke-width="2"/><line x1="28" y1="26" x2="31" y2="42" stroke="#ca8a04" stroke-width="2"/></g></g>
  <g><circle cx="520" cy="600" r="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text x="520" y="605" text-anchor="middle" class="lbl">โต๊ะ 8</text>
     <g transform="translate(552,632)"><rect width="34" height="26" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><line x1="6" y1="26" x2="3" y2="42" stroke="#ca8a04" stroke-width="2"/><line x1="28" y1="26" x2="31" y2="42" stroke="#ca8a04" stroke-width="2"/></g></g>

  <!-- teacher tables at back corners — 2 tables for 10 -->
  <rect x="95" y="596" width="150" height="26" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="170" y="614" text-anchor="middle" class="small" fill="#15803d">โต๊ะทีมอาจารย์ 1</text>
  <rect x="630" y="596" width="150" height="26" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="705" y="614" text-anchor="middle" class="small" fill="#15803d">โต๊ะทีมอาจารย์ 2</text>

  <!-- notes -->
  <rect x="40" y="700" width="820" height="105" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="58" y="724" class="noteh">แบบ C — U-shape</text>
  <text x="58" y="748" class="note">✔ เปิดกลางห้อง วิทยากรเดินเข้าถึงทุกโต๊ะง่าย เห็นหน้ากันทั่วถึง</text>
  <text x="58" y="770" class="note">✔ เหมาะกิจกรรมโต้ตอบสูง · ผู้เรียน 40 (≈5/โต๊ะ) · Flip Chart 8 · โต๊ะทีมอาจารย์ 2 ตัว (10)</text>
  <text x="58" y="792" class="note">△ ข้อจำกัด: ใช้พื้นที่มากกว่าแบบ Grid — ต้องมีห้องกว้างพอ</text>
</svg>
