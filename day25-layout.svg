<svg viewBox="0 0 900 820" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Sans Thai','Sarabun','Noto Sans Thai',sans-serif">
  <style>
    .title{font-size:26px;font-weight:700;fill:#1e293b}
    .sub{font-size:15px;fill:#475569}
    .lbl{font-size:14px;font-weight:600;fill:#0f172a}
    .small{font-size:12px;fill:#334155}
    .note{font-size:13px;fill:#334155}
    .noteh{font-size:14px;font-weight:700;fill:#0f172a}
  </style>

  <!-- Title -->
  <text x="40" y="40" class="title">แบบ A — Grid 2×4 (แถวตรง)</text>
  <text x="40" y="64" class="sub">ผู้เรียน 40 คน · โต๊ะกลม 8 (≈5 คน/โต๊ะ) · Flip Chart 8 · โต๊ะทีมอาจารย์ 2 ตัว (10 คน) ด้านหลัง</text>

  <!-- Room -->
  <rect x="40" y="80" width="820" height="600" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>

  <!-- Stage / AV zone (evening) at FRONT (top) -->
  <rect x="150" y="96" width="600" height="58" rx="8" fill="#fff7ed" stroke="#fb923c" stroke-width="2" stroke-dasharray="8 5"/>
  <text x="450" y="121" text-anchor="middle" class="lbl" fill="#c2410c">พื้นที่เวที / แสงสีเสียง (ด้านหน้า)</text>
  <text x="450" y="141" text-anchor="middle" class="small" fill="#c2410c">ทีมเข้าติดตั้งช่วงเย็น หลังจบกิจกรรม</text>

  <!-- 8 round tables: 2 cols x 4 rows, ~5 seats each -->
  <g><circle cx="300" cy="230" r="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text x="300" y="229" text-anchor="middle" class="lbl">โต๊ะ 1</text><text x="300" y="246" text-anchor="middle" class="small">5 ที่</text>
     <g transform="translate(198,206)"><rect width="34" height="26" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><line x1="6" y1="26" x2="3" y2="42" stroke="#ca8a04" stroke-width="2"/><line x1="28" y1="26" x2="31" y2="42" stroke="#ca8a04" stroke-width="2"/></g></g>
  <g><circle cx="590" cy="230" r="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text x="590" y="229" text-anchor="middle" class="lbl">โต๊ะ 2</text><text x="590" y="246" text-anchor="middle" class="small">5 ที่</text>
     <g transform="translate(488,206)"><rect width="34" height="26" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><line x1="6" y1="26" x2="3" y2="42" stroke="#ca8a04" stroke-width="2"/><line x1="28" y1="26" x2="31" y2="42" stroke="#ca8a04" stroke-width="2"/></g></g>
  <g><circle cx="300" cy="342" r="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text x="300" y="341" text-anchor="middle" class="lbl">โต๊ะ 3</text><text x="300" y="358" text-anchor="middle" class="small">5 ที่</text>
     <g transform="translate(198,318)"><rect width="34" height="26" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><line x1="6" y1="26" x2="3" y2="42" stroke="#ca8a04" stroke-width="2"/><line x1="28" y1="26" x2="31" y2="42" stroke="#ca8a04" stroke-width="2"/></g></g>
  <g><circle cx="590" cy="342" r="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text x="590" y="341" text-anchor="middle" class="lbl">โต๊ะ 4</text><text x="590" y="358" text-anchor="middle" class="small">5 ที่</text>
     <g transform="translate(488,318)"><rect width="34" height="26" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><line x1="6" y1="26" x2="3" y2="42" stroke="#ca8a04" stroke-width="2"/><line x1="28" y1="26" x2="31" y2="42" stroke="#ca8a04" stroke-width="2"/></g></g>
  <g><circle cx="300" cy="454" r="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text x="300" y="453" text-anchor="middle" class="lbl">โต๊ะ 5</text><text x="300" y="470" text-anchor="middle" class="small">5 ที่</text>
     <g transform="translate(198,430)"><rect width="34" height="26" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><line x1="6" y1="26" x2="3" y2="42" stroke="#ca8a04" stroke-width="2"/><line x1="28" y1="26" x2="31" y2="42" stroke="#ca8a04" stroke-width="2"/></g></g>
  <g><circle cx="590" cy="454" r="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text x="590" y="453" text-anchor="middle" class="lbl">โต๊ะ 6</text><text x="590" y="470" text-anchor="middle" class="small">5 ที่</text>
     <g transform="translate(488,430)"><rect width="34" height="26" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><line x1="6" y1="26" x2="3" y2="42" stroke="#ca8a04" stroke-width="2"/><line x1="28" y1="26" x2="31" y2="42" stroke="#ca8a04" stroke-width="2"/></g></g>
  <g><circle cx="300" cy="566" r="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text x="300" y="565" text-anchor="middle" class="lbl">โต๊ะ 7</text><text x="300" y="582" text-anchor="middle" class="small">5 ที่</text>
     <g transform="translate(198,542)"><rect width="34" height="26" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><line x1="6" y1="26" x2="3" y2="42" stroke="#ca8a04" stroke-width="2"/><line x1="28" y1="26" x2="31" y2="42" stroke="#ca8a04" stroke-width="2"/></g></g>
  <g><circle cx="590" cy="566" r="42" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/><text x="590" y="565" text-anchor="middle" class="lbl">โต๊ะ 8</text><text x="590" y="582" text-anchor="middle" class="small">5 ที่</text>
     <g transform="translate(488,542)"><rect width="34" height="26" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><line x1="6" y1="26" x2="3" y2="42" stroke="#ca8a04" stroke-width="2"/><line x1="28" y1="26" x2="31" y2="42" stroke="#ca8a04" stroke-width="2"/></g></g>

  <!-- Teacher team tables at BACK (bottom) — 2 tables for 10 -->
  <rect x="210" y="632" width="200" height="30" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="310" y="652" text-anchor="middle" class="lbl" fill="#15803d">โต๊ะทีมอาจารย์ 1</text>
  <rect x="490" y="632" width="200" height="30" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="590" y="652" text-anchor="middle" class="lbl" fill="#15803d">โต๊ะทีมอาจารย์ 2</text>

  <!-- Notes panel -->
  <rect x="40" y="700" width="820" height="105" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="58" y="724" class="noteh">แบบ A — Grid 2×4 · สรุปสิ่งที่ขอกับโรงแรม (วันที่ 25)</text>
  <rect x="58" y="736" width="16" height="16" rx="3" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/><text x="82" y="749" class="note">โต๊ะกลม 8 โต๊ะ — ผู้เรียน 40 คน (≈5 คน/โต๊ะ)</text>
  <rect x="58" y="760" width="16" height="16" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><text x="82" y="773" class="note">Flip Chart 8 อัน (โต๊ะละ 1 อัน)</text>
  <rect x="58" y="784" width="16" height="16" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="82" y="797" class="note">โต๊ะทีมอาจารย์ 2 ตัว ด้านหลังห้อง (วิทยากร+อจ 10 คน)</text>
  <rect x="470" y="736" width="16" height="16" rx="3" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/><text x="494" y="749" class="note">ช่วงเย็น: ทีมแสงสีเสียง+เวที เข้าติดตั้งหลังจบกิจกรรม</text>
  <text x="494" y="773" class="note">🍽  ห้องจัดเลี้ยง: แยกไปใช้อีกห้องหนึ่ง</text>
</svg>
